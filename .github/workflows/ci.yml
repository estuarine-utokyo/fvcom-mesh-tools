name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pre-commit
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: Pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
      - name: CLI smoke checks
        # Confirm every console-script entry point is importable and
        # the parsers wire up correctly. argparse exits with 0 on
        # --help, so any failure here is a regression in pyproject
        # entry points or argparse construction.
        run: |
          fmesh-buildmesh --help > /dev/null
          fmesh-perpfix --help > /dev/null
          fmesh-subset-dem --help > /dev/null
          fmesh-mesh-combine --help > /dev/null
          fmesh-mesh-check --help > /dev/null
          fmesh-mesh-clean --help > /dev/null
          fmesh-mesh-quality --help > /dev/null
