# Pre-commit hook configuration. Install with:
#
#   pip install pre-commit
#   pre-commit install
#
# Pre-commit then runs the configured hooks on every `git commit`. CI
# also runs `pre-commit run --all-files` so the local and CI checks
# agree.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        # Markdown line breaks rely on trailing double-space; keep them.
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
